<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — Checkmark</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');

    /* ── Themes ─────────────────────────────────────────────────────────── */
    body[data-theme="cream"] {
      --bg-page:      #FFFBF5;
      --bg-card:      #FFFFFF;
      --bg-subtle:    #FFF7ED;
      --text-primary: #1a1208;
      --text-muted:   #78614a;
      --border:       #e8d5b7;
      --accent:       #f97316;
      --accent-hover: #ea6c0a;
      --accent-light: #fff0e6;
    }
    body[data-theme="purple"] {
      --bg-page:      #F7F5FF;
      --bg-card:      #FFFFFF;
      --bg-subtle:    #EDE9FE;
      --text-primary: #1e1340;
      --text-muted:   #6b5fa8;
      --border:       #c4b5fd;
      --accent:       #7c3aed;
      --accent-hover: #6d28d9;
      --accent-light: #ede9fe;
    }
    body[data-theme="sky"] {
      --bg-page:      #F0FAFB;
      --bg-card:      #FFFFFF;
      --bg-subtle:    #CFFAFE;
      --text-primary: #0c2a30;
      --text-muted:   #3d8a95;
      --border:       #a7d9e2;
      --accent:       #0891b2;
      --accent-hover: #0e7490;
      --accent-light: #cffafe;
    }
    body[data-theme="rose"] {
      --bg-page:      #FFF5F7;
      --bg-card:      #FFFFFF;
      --bg-subtle:    #FFE4E6;
      --text-primary: #2d0a14;
      --text-muted:   #9f4159;
      --border:       #fecdd3;
      --accent:       #e11d48;
      --accent-hover: #be123c;
      --accent-light: #ffe4e6;
    }
    body[data-theme="forest"] {
      --bg-page:      #F3FAF3;
      --bg-card:      #FFFFFF;
      --bg-subtle:    #DCFCE7;
      --text-primary: #0a1f0a;
      --text-muted:   #3a6b3a;
      --border:       #a7d9a7;
      --accent:       #16a34a;
      --accent-hover: #15803d;
      --accent-light: #dcfce7;
    }

    /* ── Base ────────────────────────────────────────────────────────────── */
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-page);
      color: var(--text-primary);
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    /* ── Accent button ───────────────────────────────────────────────────── */
    .btn-accent {
      background-color: var(--accent);
      color: white;
      transition: background-color 0.2s ease, transform 0.1s ease;
    }
    .btn-accent:hover  { background-color: var(--accent-hover); }
    .btn-accent:active { transform: scale(0.97); }

    /* ── Nav / footer links ──────────────────────────────────────────────── */
    .site-link { color: var(--text-muted); transition: color 0.2s ease; }
    .site-link:hover { color: var(--text-primary); }

    /* ── Form inputs ─────────────────────────────────────────────────────── */
    .form-input {
      width: 100%;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      background-color: var(--bg-page);
      color: var(--text-primary);
      font-size: 0.9375rem;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .form-input::placeholder { color: var(--text-muted); opacity: 0.6; }
    .form-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-light);
    }

    /* ── Google button ───────────────────────────────────────────────────── */
    .btn-google {
      background-color: var(--bg-card);
      color: var(--text-primary);
      border: 1.5px solid var(--border);
      transition: background-color 0.2s ease, transform 0.1s ease;
    }
    .btn-google:hover  { background-color: var(--bg-subtle); }
    .btn-google:active { transform: scale(0.97); }

    /* ── Theme switcher dots ─────────────────────────────────────────────── */
    .theme-dot {
      width: 26px; height: 26px;
      border-radius: 9999px;
      border: 2px solid transparent;
      cursor: pointer; flex-shrink: 0;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .theme-dot:hover  { transform: scale(1.15); }
    .theme-dot.active { box-shadow: 0 0 0 2px var(--bg-page), 0 0 0 4px var(--accent); }
  </style>
</head>
<body data-theme="cream" class="min-h-screen flex flex-col overflow-x-hidden">

  <!-- ─── Nav ─── -->
  <nav class="flex items-center justify-between px-8 py-4" style="border-bottom: 1px solid var(--border);">
    <a href="/" class="font-black text-lg tracking-tight" style="color: var(--text-primary);">✓ Checkmark</a>

    <div class="flex items-center gap-5">
      <a href="/login"    class="site-link text-sm font-medium">Log in</a>
      <a href="/register" class="site-link text-sm font-medium">Register</a>

      <!-- Theme switcher -->
      <div class="relative">
        <button id="theme-btn" class="flex items-center justify-center w-9 h-9 rounded-full" style="background-color: var(--bg-subtle);" title="Change theme" aria-label="Change theme">
          <svg width="18" height="18" viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <path d="M10 10 L10 2 A8 8 0 0 1 18 10 Z" fill="#f97316"/>
            <path d="M10 10 L18 10 A8 8 0 0 1 10 18 Z" fill="#7c3aed"/>
            <path d="M10 10 L10 18 A8 8 0 0 1 2 10 Z"  fill="#e11d48"/>
            <path d="M10 10 L2 10 A8 8 0 0 1 10 2 Z"   fill="#16a34a"/>
            <circle cx="10" cy="10" r="8" stroke="white" stroke-width="0.8" fill="none" opacity="0.25"/>
          </svg>
        </button>
        <div id="theme-popover" style="display:none; position:absolute; right:0; top:44px; background-color:var(--bg-card); border:1px solid var(--border); border-radius:16px; padding:8px 10px; gap:8px; align-items:center; z-index:50; box-shadow:0 8px 24px rgba(0,0,0,0.10);">
          <button class="theme-dot" data-theme="cream"  style="background-color:#f97316;" title="Cream"></button>
          <button class="theme-dot" data-theme="purple" style="background-color:#7c3aed;" title="Purple"></button>
          <button class="theme-dot" data-theme="sky"    style="background-color:#0891b2;" title="Sky"></button>
          <button class="theme-dot" data-theme="rose"   style="background-color:#e11d48;" title="Rose"></button>
          <button class="theme-dot" data-theme="forest" style="background-color:#16a34a;" title="Forest"></button>
        </div>
      </div>
    </div>
  </nav>

  <!-- ─── Main ─── -->
  <main class="flex-1 flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md">

      <!-- Card -->
      <div class="rounded-2xl shadow-lg p-8" style="background-color: var(--bg-card); border: 1px solid var(--border);">

        <!-- Heading -->
        <div class="mb-8 text-center">
          <h1 class="text-2xl font-black tracking-tight mb-1" style="color: var(--text-primary);">Create your account</h1>
          <p class="text-sm" style="color: var(--text-muted);">Start winning the day in under a minute</p>
        </div>

        <!-- Form -->
        <form id="register-form" novalidate class="space-y-4">

          <div class="space-y-1">
            <label for="name" class="block text-sm font-medium" style="color: var(--text-primary);">Name</label>
            <input
              id="name" name="name" type="text" autocomplete="name"
              placeholder="Your name"
              required
              class="form-input"
            />
          </div>

          <div class="space-y-1">
            <label for="email" class="block text-sm font-medium" style="color: var(--text-primary);">Email</label>
            <input
              id="email" name="email" type="email" autocomplete="email"
              placeholder="you@example.com"
              required
              class="form-input"
            />
          </div>

          <div class="space-y-1">
            <label for="password" class="block text-sm font-medium" style="color: var(--text-primary);">Password</label>
            <input
              id="password" name="password" type="password" autocomplete="new-password"
              placeholder="••••••••"
              required
              class="form-input"
            />
          </div>

          <div class="space-y-1">
            <label for="confirm-password" class="block text-sm font-medium" style="color: var(--text-primary);">Confirm password</label>
            <input
              id="confirm-password" name="confirm_password" type="password" autocomplete="new-password"
              placeholder="••••••••"
              required
              class="form-input"
            />
          </div>

          <!-- Error message area -->
          <p id="register-error" class="text-sm hidden" style="color: var(--accent);"></p>

          <button type="submit" class="btn-accent w-full py-3 rounded-full font-bold text-base mt-2">
            Create account
          </button>

        </form>

        <!-- Divider -->
        <div class="flex items-center gap-3 my-6">
          <div class="flex-1 h-px" style="background-color: var(--border);"></div>
          <span class="text-xs font-medium" style="color: var(--text-muted);">or</span>
          <div class="flex-1 h-px" style="background-color: var(--border);"></div>
        </div>

        <!-- Google sign-up -->
        <a
          href="/auth/google"
          class="btn-google w-full flex items-center justify-center gap-3 py-3 rounded-full font-semibold text-sm"
        >
          <!-- Google logo -->
          <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
            <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615Z"/>
            <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18Z"/>
            <path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332Z"/>
            <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58Z"/>
          </svg>
          Sign up with Google
        </a>

        <!-- Switch to login -->
        <p class="text-center text-sm mt-6" style="color: var(--text-muted);">
          Already have an account?
          <a href="/login" class="font-semibold underline underline-offset-2" style="color: var(--accent);">Log in</a>
        </p>

      </div>
    </div>
  </main>

  <!-- ─── Footer ─── -->
  <footer class="py-5 px-8 flex flex-col sm:flex-row items-center justify-between gap-3 text-sm" style="border-top: 1px solid var(--border); color: var(--text-muted);">
    <span>&copy; 2026 Checkmark</span>
    <nav class="flex items-center gap-6">
      <a href="/blueprint" class="site-link">Blueprint</a>
      <a href="/login"     class="site-link">Log in</a>
      <a href="/register"  class="site-link">Register</a>
    </nav>
  </footer>

  <script>
    // ── Theme system ──────────────────────────────────────────────────────
    function setTheme(name) {
      document.body.setAttribute('data-theme', name);
      localStorage.setItem('checkmark-theme', name);
      document.querySelectorAll('.theme-dot').forEach(function (dot) {
        dot.classList.toggle('active', dot.dataset.theme === name);
      });
    }
    setTheme(localStorage.getItem('checkmark-theme') || 'cream');

    var themeBtn     = document.getElementById('theme-btn');
    var themePopover = document.getElementById('theme-popover');
    themeBtn.addEventListener('click', function (e) {
      e.stopPropagation();
      var isOpen = themePopover.style.display === 'flex';
      themePopover.style.display = isOpen ? 'none' : 'flex';
    });
    document.addEventListener('click', function () {
      themePopover.style.display = 'none';
    });
    document.querySelectorAll('.theme-dot').forEach(function (dot) {
      dot.addEventListener('click', function (e) {
        e.stopPropagation();
        setTheme(dot.dataset.theme);
      });
    });

  </script>
  <script src="config.js"></script>
  <script src="register.js"></script>
</body>
</html>
